name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php:
          - '8.4'
          - '8.5'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, libxml, mbstring
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer packages
        uses: actions/cache@v6
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ runner.os }}-php${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            composer-${{ runner.os }}-php${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Coding standard (PSR-12)
        run: composer cs

      - name: Static analysis (PHPStan)
        run: composer phpstan

      - name: Tests (PHPUnit)
        run: composer test

      - name: Run examples
        run: |
          for example in examples/*.php; do
            echo "=== $example"
            php "$example" || exit 1
          done

  tck:
    name: DMN TCK CL2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, libxml
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer packages
        uses: actions/cache@v6
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ runner.os }}-php8.4-${{ hashFiles('composer.json') }}
          restore-keys: |
            composer-${{ runner.os }}-php8.4-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Cache TCK corpus
        uses: actions/cache@v6
        with:
          path: build/tck
          key: dmn-tck-${{ hashFiles('bin/fetch-tck') }}

      - name: Fetch TCK corpus (pinned)
        run: php bin/fetch-tck

      - name: Run TCK compliance level 2 (gate = 100%)
        run: >
          php bin/tck-runner --tck build/tck/TestCases --level 2 --details
          --min-pass-rate 100 --csv tck-cl2-results.csv

      - name: Run TCK compliance level 3 (gate = 98%)
        run: >
          php bin/tck-runner --tck build/tck/TestCases --level 3
          --min-pass-rate 98 --csv tck-cl3-results.csv

      - name: Upload TCK results
        uses: actions/upload-artifact@v7
        with:
          name: tck-results
          path: |
            tck-cl2-results.csv
            tck-cl3-results.csv
